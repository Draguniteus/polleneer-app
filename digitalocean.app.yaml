name: polleneer-app
region: nyc
services:
- name: polleneer
  github:
    branch: main
    deploy_on_push: true
  source_dir: /backend
  build_command: npm install --production
  run_command: npm start
  http_port: 8080
  envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  - key: PORT
    scope: RUN_TIME
    value: "8080"
  - key: JWT_SECRET
    scope: RUN_TIME
    value: "polleneer-secret-key-2024-change-this-later"
