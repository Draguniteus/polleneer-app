name: polleneer-app
region: nyc
services:
- name: polleneer
  github:
    branch: main
    deploy_on_push: true
  source_dir: /backend
  build_command: |
    echo "🔧 Cleaning up old build files..."
    # Remove any old files that might be cached
    rm -rf public/assets/index.js 2>/dev/null || true
    rm -rf public/assets/style.css 2>/dev/null || true
    rm -rf public/test.html 2>/dev/null || true
    echo "📦 Installing dependencies..."
    npm install --production
    echo "✅ Build complete"
  run_command: npm start
  http_port: 8080
  envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  - key: PORT
    scope: RUN_TIME
    value: "8080"
  - key: JWT_SECRET
    scope: RUN_TIME
    value: "polleneer-secret-key-2024-change-this-later"
